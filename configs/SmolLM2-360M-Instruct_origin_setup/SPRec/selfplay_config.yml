# Model and data settings
base_model: "HuggingFaceTB/SmolLM2-360M-Instruct"
lora_weights: "./origin_setup_experiments/model/sft_model_SmolLM2-360M_Instruct/final_model"  # Set to path if using LoRA, otherwise leave empty
# Input data files
