# Beam CD Candidate Generation Configuration

# Model settings
base_model: "HuggingFaceTB/SmolLM2-1.7B-Instruct"
use_lora: true
finetuned_path: "./re_run_experiments/model/sft_model/final_model"

# Data paths
train_data_path: "./data/sampled/Goodreads/train.json"
valid_data_path: "./data/sampled/Goodreads/valid.json"
name2genre_path: "./data/eval/Goodreads/name2genre.json"

# Generation settings
diverse_beam_search: true
num_return_sequences: 10
diversity_penalty: 1.0

# Batch and sampling sizes
batch_size: 1
train_size: 1024
valid_size: 128

# Save output path (results will be saved here)
save_dir: "./re_run_experiments/data/beam_cd_candidates"