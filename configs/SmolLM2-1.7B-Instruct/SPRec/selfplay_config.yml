# Model and data settings
base_model: "HuggingFaceTB/SmolLM2-1.7B-Instruct"
lora_weights: "./re_run_experiments/model/sft_model/final_model"  # Set to path if using LoRA, otherwise leave empty
# Input data files
train_data_path: "./data/sampled/Goodreads/train.json"
valid_data_path: "./data/sampled/Goodreads/valid.json"
# Output files for DPO formatted data (line-separated JSON)
output_path: "./re_run_experiments/data/SPRec"
# sample_method: "selfplay"
# Sampling and batch parameters
batch_size: 4
# Additional parameters (not used in this version, but can be extended)
load_8bit: false
random_neg: false