training:
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 16
  warmup_steps: 20

  # learning_rate: 0.0003
  learning_rate: 0.0002

  num_train_epochs: 4
  logging_steps: 1
  bf16: true

lora:
  r: 16
  lora_alpha: 32
  target_modules: ['k_proj', 'v_proj', 'q_proj', 'o_proj', 'gate_proj', 'up_proj', 'down_proj']
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

# base_model_name: "HuggingFaceTB/SmolLM-1.7B-Instruct"
base_model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

seed: 0
# resume_from_checkpoint: "/experiments/model/sft_model_Llama321B_SPRecSet_4096/final_model"
output_path: "./experiments/model/sft_model_SmolLM2-135M_Instruct"

# train_data_path: "/scratch/user/chuanhsin0110/ClusterExposure-DPO/data/sampled/Goodreads/train.json"
# valid_data_path: "/scratch/user/chuanhsin0110/ClusterExposure-DPO/data/sampled/Goodreads/valid.json"
train_data_path: "./data/raw/Goodreads/train.json"
valid_data_path: "./data/raw/Goodreads/valid.json"


train_sample_size: 2048
valid_sample_size: 256

device_map: 0

